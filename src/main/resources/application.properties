# HTTP Server Configuration
quarkus.http.port=7654
quarkus.http.host=0.0.0.0

# Application info
quarkus.application.name=MCP Language Tools
quarkus.application.version=0.1.0-SNAPSHOT

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.redhat.mcp.lsp.orchestrator".level=DEBUG

# JDT.LS Configuration
mcp.lsp.jdtls.version=1.58.0
mcp.lsp.jdtls.timestamp=202604151538
mcp.lsp.jdtls.auto-download=true
mcp.lsp.jdtls.home=${user.home}/.mcp-lsp/jdtls
mcp.lsp.jdtls.download-url=https://www.eclipse.org/downloads/download.php?file=/jdtls/milestones/${mcp.lsp.jdtls.version}/jdt-language-server-${mcp.lsp.jdtls.version}-${mcp.lsp.jdtls.timestamp}.tar.gz&r=1

# Workspace Configuration
mcp.lsp.workspace.data-dir=${user.home}/.mcp-lsp/workspaces

# LSP Servers Configuration
mcp.lsp.servers.base-dir=${user.home}/.mcp-lsp/lsp

# Dev UI
quarkus.dev-ui.always-include=true

# MCP Traffic logging
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=50000